<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>点検アプリ PWA</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="wrap">
        <div style="font-weight:bold; font-size:18px;">点検アプリ</div>
        <nav>
            <button data-nav="master" class="active">設定</button>
            <button data-nav="list">一覧</button>
        </nav>
    </div>
</header>

<main>
    <section id="screen-master" class="active">
        <div class="card">
            <h3>データ取込</h3>
            <div class="row">
                <div>
                    <label>項目マスタ (CSV)</label>
                    <input type="file" id="master-file" accept=".csv">
                    <button class="btn primary" id="btn-import-master" style="margin-top:8px; width:100%;">項目マスタ取込</button>
                </div>
                <div>
                    <label>点検データ (CSV)</label>
                    <input type="file" id="places-file" accept=".csv">
                    <button class="btn primary" id="btn-import-places" style="margin-top:8px; width:100%;">点検データ取込</button>
                </div>
            </div>
            <p style="font-size:12px; color:var(--gray);">※取込後、自動的にリロードされます。</p>
        </div>

        <div class="card" style="border-color: #fee2e2;">
            <h3 style="color: #dc2626;">データメンテナンス</h3>
            <div class="row">
                <button class="btn" id="btn-clear-master" style="color: #dc2626; border-color: #fecaca;">マスタ・点検データを全削除</button>
                <button class="btn" id="btn-clear-inspections" style="color: #dc2626; border-color: #fecaca;">点検データのみ全削除</button>
            </div>
            <p style="font-size:12px; color:var(--gray);">※削除したデータは元に戻せません。</p>
        </div>
    </section>

    <section id="screen-list">
        <div class="card">
            <div class="row">
                <div>
                    <label>点検種別</label>
                    <select id="filter-type">
                        <option value="">選択してください</option>
                    </select>
                </div>
                <div>
                    <label>点検日</label>
                    <input type="date" id="filter-date">
                </div>
                <div>
                    <label>状況</label>
                    <select id="filter-status">
                        <option value="all">すべて</option>
                        <option value="pending">未完了</option>
                        <option value="submitted">完了</option>
                    </select>
                </div>
            </div>
            <button class="btn info" id="btn-go-map" style="width:100%; margin-bottom:10px;">地図で確認する</button>
            <button class="btn" id="btn-export-csv" style="width:100%; margin-bottom:15px; background: #f9fafb;">検索結果をCSV出力</button>
        </div>

        <div class="card" style="padding:0;">
            <table class="table">
                <thead>
                    <tr>
                        <th>点検箇所</th>
                        <th>状況</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="list-tbody">
                </tbody>
            </table>
        </div>
    </section>

    <section id="screen-form">
        <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" id="btn-back-list">← 戻る</button>
            <h2 id="form-meta" style="margin:0; font-size:16px;"></h2>
        </div>
        <div id="inspect-form"></div>
        <div style="padding:20px; display:flex; gap:10px;">
            <button class="btn" id="btn-cancel" style="flex:1;">キャンセル</button>
            <button class="btn primary" id="btn-save" style="flex:2; font-size:18px;">点検完了を保存</button>
        </div>
    </section>

    <section id="screen-map">
        <div id="map"></div>
        <div id="map-ui">
            <button class="btn primary" onclick="showScreen('list')" style="box-shadow: 0 4px 10px rgba(0,0,0,0.3);">一覧に戻る</button>
        </div>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
